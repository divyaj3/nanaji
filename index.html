<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FBF7F2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#161210" media="(prefers-color-scheme: dark)">
  <title>दादाजी — Live Captions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #FBF7F2;
      --surface:      #FFFFFF;
      --border:       #DDD0BC;
      --text:         #1C1410;
      --text-muted:   #8A7A68;
      --text-interim: #C4B0A0;
      --gold:         #C8904A;
      --gold-bg:      #FBF0E4;
      --start:        #1A7A55;
      --stop:         #B5341B;
      --sz-muted:     #B0A090;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #161210;
        --surface:      #201C18;
        --border:       #3A302A;
        --text:         #F5EDE2;
        --text-muted:   #8A7A68;
        --text-interim: #4A3C30;
        --gold:         #D4A060;
        --gold-bg:      #281E10;
        --start:        #28A070;
        --stop:         #C84020;
        --sz-muted:     #6A5A48;
      }
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans Devanagari', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    /* ── Photo ring — the signature element ── */
    .photo-wrap {
      position: relative;
      width: 54px; height: 54px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 50%;
      border: 2.5px solid var(--gold);
      background: var(--gold-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.38);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .photo-wrap:hover .photo-overlay { opacity: 1; }

    /* Always show camera hint on touch devices */
    @media (hover: none), (pointer: coarse) {
      .photo-overlay { opacity: 0.55; }
    }

    /* Profile text */
    .profile-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dada-name {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      border-bottom: 1.5px dashed transparent;
      padding: 1px 2px;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: border-color 0.15s, text-overflow 0s;
      cursor: text;
      line-height: 1.3;
    }

    .dada-name:focus {
      border-bottom-color: var(--gold);
      text-overflow: clip;
      overflow: visible;
    }

    .dada-name:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      font-weight: 400;
    }

    .edit-hint {
      flex-shrink: 0;
      color: var(--gold);
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1;
    }
    .name-row:hover .edit-hint { opacity: 0.7; }

    .dada-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Header right ── */
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .lang-pills {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .lang-pill {
      padding: 5px 12px;
      font-size: 13px;
      font-family: inherit;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
    }

    .lang-pill.active {
      background: var(--start);
      color: #fff;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Status bar ── */
    .status-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.on {
      background: var(--start);
      animation: blink 1.3s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    #statusText {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main display ── */
    #display {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 16px;
      font-size: 48px;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
    }

    #interimText { color: var(--text-interim); }

    #hint {
      color: var(--text-interim);
      font-size: 32px;
      line-height: 1.65;
    }

    #hint small {
      font-size: 0.58em;
      display: block;
      margin-top: 6px;
    }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .size-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sz-sm  { font-size: 12px; color: var(--sz-muted); font-weight: 500; }
    .sz-lg  { font-size: 20px; color: var(--sz-muted); font-weight: 500; }
    .sz-num { font-size: 11px; color: var(--sz-muted); min-width: 36px; text-align: right; }

    input[type=range] {
      flex: 1; height: 4px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 99px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--start); cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--start); cursor: pointer; border: none;
    }

    .btn-row { display: flex; gap: 10px; }

    #mainBtn {
      flex: 1;
      padding: 17px 16px;
      border: none; border-radius: 14px;
      font-size: 18px; font-weight: 500;
      font-family: inherit;
      background: var(--start); color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #mainBtn:active { transform: scale(0.97); }
    #mainBtn.stop   { background: var(--stop); }
    #mainBtn svg    { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

    #clearBtn {
      padding: 17px 20px;
      border: 1px solid var(--border); border-radius: 14px;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #clearBtn:active { background: var(--border); }
    #clearBtn svg {
      width: 20px; height: 20px;
      fill: none; stroke: var(--text-muted);
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Warning box ── */
    #warnBox {
      display: none;
      flex-shrink: 0;
      margin: 10px 16px 0;
      padding: 12px 16px;
      background: #FFF3C0;
      border: 1px solid #E8C030;
      border-radius: 10px;
      font-size: 14px;
      color: #5C4400;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      #warnBox { background: #28200A; border-color: #886800; color: #FFD84A; }
    }

    /* ── Scrollbar ── */
    #display::-webkit-scrollbar { width: 5px; }
    #display::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Responsive ── */
    @media (max-width: 360px) {
      .dada-name    { font-size: 15px; max-width: 110px; }
      .dada-subtitle { display: none; }
      .lang-pill    { padding: 5px 9px; font-size: 12px; }
      #display      { padding: 18px 14px 12px; font-size: 34px; }
      #hint         { font-size: 24px; }
      #mainBtn      { font-size: 16px; padding: 15px 10px; }
    }

    @media (min-width: 600px) {
      header   { padding: 12px 24px; }
      .photo-wrap { width: 62px; height: 62px; }
      .dada-name  { font-size: 20px; max-width: 220px; }
      #display { padding: 36px 36px 20px; }
      footer   { padding: 14px 24px 24px; }
    }

    @media (min-width: 1024px) {
      body     { max-width: 820px; margin: 0 auto; box-shadow: 0 0 0 1px var(--border); }
      html     { background: var(--bg); }
    }
  </style>
</head>
<body>

<header>
  <!-- Left: photo + name -->
  <div class="profile">
    <div class="photo-wrap"
         onclick="document.getElementById('photoInput').click()"
         title="Tap to add photo"
         role="button"
         aria-label="Upload dadaji photo">
      <img id="dadaPhoto" alt="Dadaji photo">
      <div class="photo-placeholder" id="photoPlaceholder">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/>
        </svg>
      </div>
      <div class="photo-overlay" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">
          <path d="M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(this)">

    <div class="profile-info">
      <div class="name-row">
        <span class="dada-name"
              id="dadaName"
              contenteditable="true"
              data-placeholder="दादाजी"
              role="textbox"
              aria-label="Edit name"
              spellcheck="false"
              onblur="saveName(this)"
              onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">दादाजी</span>
        <svg class="edit-hint" width="12" height="12" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <span class="dada-subtitle">Live Captions &nbsp;·&nbsp; बोलिए, वे पढ़ लेंगे</span>
    </div>
  </div>

  <!-- Right: language + fullscreen -->
  <div class="header-right">
    <div class="lang-pills">
      <button class="lang-pill active" id="hiBtn" onclick="setLang('hi')">हिन्दी</button>
      <button class="lang-pill"        id="enBtn" onclick="setLang('en')">English</button>
    </div>
    <button class="icon-btn" onclick="toggleFS()" title="Fullscreen" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3"  y1="21" x2="10" y2="14"/>
      </svg>
    </button>
  </div>
</header>

<div id="warnBox">
  ⚠️ यह ऐप <strong>Google Chrome</strong> या <strong>Microsoft Edge</strong> में खोलें।<br>
  Please open in <strong>Google Chrome</strong> or <strong>Microsoft Edge</strong> for Hindi speech support.
</div>

<!-- Status strip -->
<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="statusText">शुरू करने के लिए नीचे दबाएँ &nbsp;·&nbsp; Press Start below</span>
</div>

<!-- Captions display -->
<div id="display">
  <span id="finalText"></span><span id="interimText"></span>
  <span id="hint">
    बोलिए — शब्द यहाँ दिखेंगे
    <small>Speak — words will appear here</small>
  </span>
</div>

<footer>
  <!-- Font size slider -->
  <div class="size-row">
    <span class="sz-sm">A</span>
    <input type="range" id="sizeSlider" min="28" max="80" value="48" step="2"
           oninput="resizeFont(this.value)">
    <span class="sz-lg">A</span>
    <span class="sz-num" id="sizeLabel">48px</span>
  </div>
  <!-- Action buttons -->
  <div class="btn-row">
    <button id="mainBtn" onclick="toggleListen()">
      <svg id="btnIcon" viewBox="0 0 24 24">
        <path id="btnPath"
          d="M12 1a3.5 3.5 0 0 0-3.5 3.5v7a3.5 3.5 0 0 0 7 0v-7A3.5 3.5 0 0 0 12 1z
             M6.5 11.5a5.5 5.5 0 0 0 11 0h2a7.5 7.5 0 0 1-6.5 7.43V21h2v2h-6v-2h2v-2.07
             A7.5 7.5 0 0 1 4.5 11.5h2z"/>
      </svg>
      <span id="btnLabel">सुनना शुरू करें</span>
    </button>
    <button id="clearBtn" onclick="clearAll()" aria-label="Clear all text">
      <svg viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
      </svg>
    </button>
  </div>
</footer>

<script>
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec          = null;
  let active       = false;
  let finalText    = '';
  let lang         = 'hi-IN';
  let restartTimer = null;

  /*
   * Android Chrome replays the last phrase at the start of each new
   * recognition session. We catch this by remembering the last text
   * added and the time it was added. If the exact same text arrives
   * again within 2 seconds, we silently drop it.
   */
  let lastAddedText = '';
  let lastAddedTime = 0;

  function setup() {
    if (!SR) {
      document.getElementById('warnBox').style.display = 'block';
      const btn = document.getElementById('mainBtn');
      btn.disabled = true; btn.style.opacity = '0.4';
      setStatus(false, 'Browser not supported — open in Chrome or Edge');
      return false;
    }

    rec = new SR();
    /*
     * continuous = false  ← key Android fix.
     * With continuous: true, Chrome on Android accumulates results across
     * restarts and can fire them again. With continuous: false every session
     * handles exactly one utterance with its own clean result list, then
     * onend fires and we restart for the next utterance. Far more reliable
     * on mobile.
     */
    rec.continuous      = false;
    rec.interimResults  = true;
    rec.maxAlternatives = 1;
    rec.lang            = lang;

    rec.onresult = (e) => {
      let interim = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const text = e.results[i][0].transcript.trim();
          const now  = Date.now();
          /*
           * Deduplication: Android sometimes sends the same final result
           * twice — once in the session that recognised it, and once at
           * the start of the restarted session. Drop it if identical text
           * was added less than 2 seconds ago.
           */
          if (text && (text !== lastAddedText || now - lastAddedTime > 2000)) {
            finalText    += text + ' ';
            lastAddedText = text;
            lastAddedTime = now;
          }
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      render(finalText, interim);
    };

    rec.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      if (e.error === 'not-allowed') {
        setStatus(false, 'Mic blocked — allow microphone in browser settings');
        active = false; syncBtn(); return;
      }
      setStatus(false, 'Error: ' + e.error + ' — tap Start again');
      active = false; syncBtn();
    };

    rec.onend = () => {
      /* Clear any dangling interim text when the utterance session ends */
      render(finalText, '');
      if (active) {
        /* Track the timer so we can cancel it if the user acts first */
        restartTimer = setTimeout(() => {
          restartTimer = null;
          try { if (rec) rec.start(); } catch (_) {}
        }, 150);
      }
    };

    return true;
  }

  function render(fin, int) {
    document.getElementById('finalText').textContent   = fin;
    document.getElementById('interimText').textContent = int;
    document.getElementById('hint').style.display      = (fin || int) ? 'none' : '';
    const d = document.getElementById('display');
    d.scrollTop = d.scrollHeight;
  }

  function toggleListen() {
    if (!rec && !setup()) return;

    /* Cancel any pending auto-restart before taking manual action */
    clearTimeout(restartTimer);
    restartTimer = null;

    if (active) {
      active = false;
      try { rec.stop(); } catch (_) {}
      render(finalText, '');
      setStatus(false, lang === 'hi-IN' ? 'रुका हुआ — फिर दबाएँ' : 'Stopped — tap Start again');
    } else {
      /* Reset everything for a fresh start */
      finalText     = '';
      lastAddedText = '';
      lastAddedTime = 0;
      render('', '');
      active   = true;
      rec.lang = lang;
      /* If start() throws the session is already running — just leave it */
      try { rec.start(); } catch (_) {}
      setStatus(true, lang === 'hi-IN' ? 'सुन रहा है...' : 'Listening...');
    }
    syncBtn();
  }

  function syncBtn() {
    const btn  = document.getElementById('mainBtn');
    const lbl  = document.getElementById('btnLabel');
    const path = document.getElementById('btnPath');
    if (active) {
      lbl.textContent = lang === 'hi-IN' ? 'बंद करें' : 'Stop';
      btn.classList.add('stop');
      path.setAttribute('d', 'M7 7h10v10H7z');
    } else {
      lbl.textContent = lang === 'hi-IN' ? 'सुनना शुरू करें' : 'Start listening';
      btn.classList.remove('stop');
      path.setAttribute('d',
        'M12 1a3.5 3.5 0 0 0-3.5 3.5v7a3.5 3.5 0 0 0 7 0v-7A3.5 3.5 0 0 0 12 1z' +
        'M6.5 11.5a5.5 5.5 0 0 0 11 0h2a7.5 7.5 0 0 1-6.5 7.43V21h2v2h-6v-2h2v-2.07' +
        'A7.5 7.5 0 0 1 4.5 11.5h2z');
    }
  }

  function setStatus(on, text) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
  }

  function setLang(code) {
    lang = code === 'hi' ? 'hi-IN' : 'en-IN';
    document.getElementById('hiBtn').className = 'lang-pill' + (code === 'hi' ? ' active' : '');
    document.getElementById('enBtn').className = 'lang-pill' + (code === 'en' ? ' active' : '');
    if (active && rec) {
      clearTimeout(restartTimer);
      restartTimer  = null;
      lastAddedText = '';
      lastAddedTime = 0;
      try { rec.stop(); } catch (_) {}
      finalText = ''; render('', '');
      setTimeout(() => {
        if (active && rec) { rec.lang = lang; try { rec.start(); } catch (_) {} }
      }, 300);
    }
    syncBtn();
  }

  function clearAll() {
    finalText = ''; render('', '');
    document.getElementById('hint').style.display = '';
  }

  function resizeFont(v) {
    document.getElementById('display').style.fontSize = v + 'px';
    document.getElementById('sizeLabel').textContent  = v + 'px';
  }

  function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
  }

  function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 240;
        const ctx = canvas.getContext('2d');
        const min = Math.min(img.width, img.height);
        ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, 240, 240);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
        applyPhoto(dataUrl);
        try { localStorage.setItem('dadaji_photo', dataUrl); } catch (_) {}
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  function applyPhoto(dataUrl) {
    const imgEl = document.getElementById('dadaPhoto');
    imgEl.src = dataUrl;
    imgEl.style.display = 'block';
    document.getElementById('photoPlaceholder').style.display = 'none';
  }

  function saveName(el) {
    let name = el.textContent.trim();
    if (!name) { el.textContent = 'दादाजी'; name = 'दादाजी'; }
    try { localStorage.setItem('dadaji_name', name); } catch (_) {}
  }

  document.getElementById('dadaName').addEventListener('paste', (e) => {
    e.preventDefault();
    document.execCommand('insertText', false,
      (e.clipboardData || window.clipboardData).getData('text/plain'));
  });

  try {
    const savedPhoto = localStorage.getItem('dadaji_photo');
    if (savedPhoto) applyPhoto(savedPhoto);
    const savedName = localStorage.getItem('dadaji_name');
    if (savedName) document.getElementById('dadaName').textContent = savedName;
  } catch (_) {}

  window.addEventListener('beforeunload', () => {
    active = false;
    clearTimeout(restartTimer);
    restartTimer = null;
    finalText = '';
    if (rec) { try { rec.abort(); } catch (_) {} rec = null; }
  });

  setup();
</script>
</body>
</html>
